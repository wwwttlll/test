baseline:
  name: WISER
  paper_url: https://arxiv.org/pdf/2602.23029
  type: serial_refinement_training_free
  role: primary_baseline

protocol:
  datasets:
    - CIRR
    - FashionIQ
  backbone: openai/clip-vit-large-patch14
  default_k_values: [1, 2, 4, 8, 16, 32]
  default_top_n: 400
  default_seeds: [42, 43, 44]
  budget_report:
    - forward_pass_per_query
    - wall_clock_per_query

runner:
  script: scripts/run_wiser_baseline.py
  default_rounds: [1, 2, 3]
  default_sampling_mode: textual

notes:
  - Keep same candidate pool and pre-retrieval top-N as TTS-CIR for fair comparison.
  - Report Equal-FWD and Equal-Time results side by side.
